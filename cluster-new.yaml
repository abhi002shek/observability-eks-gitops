apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: obs-practice
  region: ap-south-1
  version: "1.32"

iam:
  withOIDC: true

managedNodeGroups:
  - name: obs-ng
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    iam:
      withAddonPolicies:
        ebs: true
        cloudWatch: true
