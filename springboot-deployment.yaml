apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot
  template:
    metadata:
      labels:
        app: springboot
    spec:
      containers:
        - name: springboot
          image: abhi00shek/springboot-demo:latest
          ports:
            - containerPort: 8080