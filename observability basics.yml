observability_training.yaml: |

  #######################################################################
  # OBSERVABILITY TRAINING CHEATSHEET (Ubuntu + EKS + Spring Boot)
  #######################################################################

  #######################################################################
  # CORE CONCEPTS
  #######################################################################
  Monitoring: is the practice of collecting, processing, and analyzing
        predefined metrics and alerts to track the health of a system.
      focus: "Known unknowns (things you expect might break)"
      example: >
        Alert when CPU usage > 80% or when HTTP 5xx errors exceed threshold.

        Traditional monitoring is primarily about metrics, not logs and traces.
        Why people think monitoring includes logs/traces?
        Modern platforms (like Datadog, New Relic) bundle:
        Metrics
        Logs
        Traces

  Monitoring = detection
 “Something is wrong”

Observability = explanation
“Why is it wrong?”      

  
  observability:
    definition: Observability is the ability to measure the internal state of a system
      by examining outputs (metrics, logs, traces).

    metrics:
      definition: Numeric measurements collected over time (CPU, memory, request latency).
      example: "Requests per second, JVM memory usage"
      tools: [Prometheus Mimir as Data Source and Grafana for Visualization]
    
    logs:
      definition: Immutable timestamped text records of events.
      example: "Error stack trace in Spring Boot, Nginx access logs"
      tools: [Grafana Loki, ELK and Grafana for Visualization]
    
    traces:
      definition: End-to-end request journey across distributed services.
      example: "Tracing a user request from frontend → API → DB"
      tools: [Grafana Tempo, Jaeger and Grafana for Visualization]

pillars_of_observability:
    metrics:
      description: >
        Numerical measurements collected over time that represent system performance.
      characteristics:
        - Lightweight
        - Aggregatable
        - Good for alerting
      examples:
        - cpu_usage_percent
        - request_rate_per_second
        - error_rate
        - memory_usage

    logs:
      description: >
        Immutable, timestamped records of discrete events generated by applications or systems.
      characteristics:
        - High detail
        - Context-rich
        - Useful for debugging
      examples:
        - "User login failed due to invalid password"
        - "Database connection timeout error"

    traces:
      description: >
        End-to-end representation of a request as it flows through multiple services.
      characteristics:
        - Distributed visibility
        - Shows latency breakdown
        - Identifies bottlenecks
      examples:
        - "Request flows from API Gateway → Auth Service → Payment Service → Database"

  real_world_production_example:
    scenario: "E-commerce checkout latency issue"

    symptoms:
      - "Users report slow checkout"
      - "No immediate alerts triggered"

    metrics_analysis:
      observations:
        - "Slight increase in API latency"
        - "CPU and memory usage normal"
        - "Error rate low"

    logs_analysis:
      observations:
        - "Intermittent timeout errors in payment service"
        - "Retries observed in application logs"

    traces_analysis:
      observations:
        - "Checkout request taking longer in payment service"
        - "External payment gateway API causing delay"

    root_cause:
      description: >
        Third-party payment gateway latency increased, causing cascading delays
        in the checkout workflow.

    conclusion:
      monitoring_limitations: >
        Monitoring did not trigger alerts because thresholds were not breached.
      observability_value: >
        Observability enabled deep debugging by correlating metrics, logs,
        and traces to identify the true bottleneck.

  key_takeaways:
    - "Monitoring tells you WHEN something is wrong."
    - "Observability tells you WHY something is wrong."
    - "Metrics provide signals, logs provide context, traces provide flow."
    - "All three pillars are required for effective SRE practices."      

  #######################################################################
  # RESOURCES & DATA SOURCES
  #######################################################################
  infra_building_blocks:
    resources: "Managed entities (EC2 instance, Pod, DB, Load Balancer)"
    data_sources: "Connections that collect telemetry (Prometheus scrape target, datasources)"

  Infrastructure Monitoring:
    definition: "Monitoring the underlying infrastructure (servers, nodes, VMs) that applications run on."
    For a Kubernetes cluster, this includes:
      - Node metrics (CPU, memory, disk, network) - via an agent like node-exporter
      - Control plane metrics (API server, scheduler, controller manager, coredns)
      - Cluster-level metrics [Pods, Deployments, daemonsets etc] - via kube-state-metrics
      - Container metrics (CPU, memory usage of containers) - via cAdvisor or kubelet


  #######################################################################
  # PROMETHEUS MIMIR + GRAFANA + TEMPO (INITIAL CONFIG) - Leave this part for now
  #######################################################################
  config_examples:
    prometheus_scrape:
      job_name: 'springboot-app'
      static_configs:
        - targets: ['localhost:8080']   # Spring Boot actuator metrics endpoint

    grafana_datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://mimir:9009/prometheus
        - name: Tempo
          type: tempo
          url: http://tempo:3100

  #######################################################################
  # STANDARD CONTAINER ALERTS (AWS EKS)
  #######################################################################
  eks_container_alerts:
    - HighCPUUsage: "CPU usage > 80% for 5 minutes"
    - HighMemoryUsage: "Memory usage > 80% for 5 minutes"
    - PodCrashLoop: "Container restarts > 3 in 5 minutes"
    - NodeNotReady: "Node not in Ready state for > 5 minutes"
    - DiskPressure: "Node reports DiskPressure condition"

What is DiskPressure in Kubernetes?

DiskPressure is a condition reported by a Kubernetes Node when the node’s disk is running out of space or inodes.

Kubernetes uses the kubelet to constantly check resource availability on nodes (CPU, memory, disk, etc.).

If the kubelet detects that disk resources are too low, it marks the node with the condition DiskPressure = True.

Why does it matter?

When a node has DiskPressure, Kubernetes starts taking action to protect the cluster:

Pod Eviction: The kubelet will evict (terminate) some pods from that node to free up disk space.

Pod Scheduling: The scheduler will avoid placing new pods on the affected node until the condition clears.

What triggers DiskPressure?

Low disk space (e.g., /var/lib/kubelet, /var/lib/docker getting full).
Low inodes (too many small files even if there’s free disk space).
In Linux, an inode (index node) is a fundamental data structure within a Unix-style file system that stores metadata about a file or directory. 
Every file and directory on a Linux file system is associated with a unique inode. 

  #######################################################################
  # JAVA SPRING BOOT METRICS TO MONITOR
  #######################################################################
  springboot_metrics:
  jvm_memory_used_bytes – Current memory used by the JVM in bytes.
jvm_gc_pause_seconds_count – Number of garbage collection pause events that have occurred.
http_server_requests_seconds_count – Total number of HTTP requests handled by the server.
http_server_requests_seconds_sum – Total time spent handling HTTP requests (in seconds).
tomcat_threads_busy – Number of Tomcat request-handling threads currently in use.
process_cpu_usage – Percentage of CPU used by the Spring Boot process.
application_ready_time_seconds – Time taken for the application to start up and be ready (in seconds).

Garbage collection (GC) in Java is an automatic memory management process, handled by the Java Virtual Machine (JVM), 
that reclaims memory from objects that are no longer referenced or used by the running program.

The Java Virtual Machine (JVM) is a crucial component of the Java platform, 
acting as a virtual machine that enables Java programs to run on various operating systems and hardware platforms. 
Its primary function is to interpret Java bytecode, which is the compiled form of Java source code, 
and translate it into machine-specific code that the underlying system can execute.

Apache Tomcat, often referred to simply as Tomcat, is an open-source web server and servlet container.
It is a widely used and popular choice for deploying and serving Java web applications.

  #######################################################################
  # CUSTOM ALERT CONFIGURATION IN SPRING BOOT REPO
  #######################################################################
  custom_alert:
    steps:
      - Enable Actuator Prometheus Exporter:
          dependency: "spring-boot-starter-actuator"
          config: "management.endpoints.web.exposure.include=prometheus"
      - Create custom metric:
          code_example: |
            @Autowired
            MeterRegistry registry;

            Counter customErrorCounter = Counter.builder("app_custom_errors_total")
                .description("Custom error counter")
                .register(registry);
      - Fire metric in code:
          usage: "customErrorCounter.increment();"
      - Alert in Prometheus:
          alert_rule: |
            - alert: HighCustomErrors
              expr: increase(app_custom_errors_total[5m]) > 10
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High custom errors in app"

  #######################################################################
  # OTLP ENDPOINT
  #######################################################################
  otlp:
    definition: "OTLP (OpenTelemetry Protocol) endpoint is the standard endpoint
      where applications export telemetry data (metrics, logs, traces)."
    example: "otel-collector:4317"
    purpose: "Ensures vendor-neutral interoperability for observability."

  #######################################################################
  # COMMON UBUNTU COMMANDS (OBSERVABILITY CONTEXT)
  #######################################################################
  commands:
    - "top: Show running processes with CPU/memory usage"
    - "htop: Interactive process viewer"
    - "df -h: Show disk usage in human-readable format"
    - "du -sh *: Show size of directories"
    - "free -m: Show memory usage in MB"
    - "netstat -tulnp: List listening ports and processes"
    - "ss -tulwn: Modern replacement for netstat"
    - "curl -v http://localhost:8080/actuator/prometheus: Test metrics endpoint"
    - "journalctl -u <service>: Show logs for a systemd service"
    - "docker ps: List running containers"
    - "kubectl get pods -n <ns>: Show running pods in namespace"
    - "kubectl describe pod <name>: Detailed pod info with events"
    - "kubectl logs <pod>: View logs of a container in Kubernetes"