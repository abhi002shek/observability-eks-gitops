apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot
  template:
    metadata:
      labels:
        app: springboot
    spec:
      containers:
        - name: springboot
          image: bhavukm/springboot-demo:latest
          ports:
            - containerPort: 8080

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel/opentelemetry-javaagent.jar"

            - name: OTEL_SERVICE_NAME
              value: springboot-app

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.observability.svc.cluster.local:4318

            - name: OTEL_TRACES_EXPORTER
              value: otlp

            - name: OTEL_METRICS_EXPORTER
              value: none

            - name: OTEL_LOGS_EXPORTER
              value: none

          volumeMounts:
            - name: otel-agent
              mountPath: /otel

      initContainers:
        - name: otel-agent
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - >
              curl -L -o /otel/opentelemetry-javaagent.jar
              https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar
          volumeMounts:
            - name: otel-agent
              mountPath: /otel

      volumes:
        - name: otel-agent
          emptyDir: {}