apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  namespace: app
  labels:
    app: springboot
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot
  template:
    metadata:
      labels:
        app: springboot
        version: v1
    spec:
      containers:
        - name: springboot
          image: abhi00shek/springboot-demo:latest
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/app/otel-agent.jar -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: OTEL_SERVICE_NAME
              value: "springboot-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-agent.observability.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
