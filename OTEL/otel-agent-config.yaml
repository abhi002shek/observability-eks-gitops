apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
  namespace: observability
data:
  otel-agent-config.yaml: |
    receivers:
      # Scrapes Spring Boot Prometheus metrics endpoint
      prometheus:
        config:
          scrape_configs:
            - job_name: springboot
              metrics_path: /actuator/prometheus
              scrape_interval: 15s
              static_configs:
                - targets:
                    - springboot-service.app.svc.cluster.local:80

      # Receives traces + logs pushed by OTEL Java agent in the app
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      # Forward everything to the central gateway
      otlp:
        endpoint: otel-gateway.observability.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [otlp]
        logs:
          receivers: [otlp]
          exporters: [otlp]
        traces:
          receivers: [otlp]
          exporters: [otlp]
