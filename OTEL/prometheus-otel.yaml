apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: otel
        metrics_path: /metrics
        static_configs:
          - targets:
              - otel-gateway.observability.svc.cluster.local:8889