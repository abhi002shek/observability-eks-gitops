apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: observability
data:
  otel-gateway-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      # Metrics → Prometheus (scrapes this endpoint)
      prometheus:
        endpoint: "0.0.0.0:8889"

      # Logs → Loki
      loki:
        endpoint: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

      # Traces → Tempo
      otlp/tempo:
        endpoint: http://tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          exporters: [loki]
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo]
